apiVersion: v1
kind: ConfigMap
metadata:
  name: openshell-apparmor-profiles
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
data:
  openshell-supervisor: |-
    #include <tunables/global>

    profile openshell-supervisor flags=(attach_disconnected,mediate_deleted) {
      #include <abstractions/base>

      # Allow all network operations
      network,
      
      # Allow capabilities (the container restricts this via securityContext anyway)
      capability,

      # Allow file read/write (the container mount namespace restricts host access)
      file,

      # Allow bind mounting the network namespace
      mount options=(rw, bind) /run/netns/** -> /run/netns/**,
      
      # Allow shared mount propagation
      mount options=(rw, make-shared) -> /run/netns/,

      # Deny all other mounts to prevent host breakout
      deny mount,

      # Allow ptrace
      ptrace,

      # Allow signals
      signal,
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "openshell.fullname" . }}-apparmor-loader
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: apparmor-loader
      {{- include "openshell.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apparmor-loader
        {{- include "openshell.selectorLabels" . | nindent 8 }}
    spec:
      hostPID: true
      containers:
        - name: loader
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              echo "Loading openshell-supervisor AppArmor profile..."
              cp /profiles/openshell-supervisor /etc/apparmor.d/openshell-supervisor
              nsenter -t 1 -m -u -i -n -- apparmor_parser -r -W /etc/apparmor.d/openshell-supervisor
              echo "Profile loaded successfully. Sleeping indefinitely."
              sleep infinity
          volumeMounts:
            - name: profiles
              mountPath: /profiles
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: apparmor
              mountPath: /etc/apparmor.d
      volumes:
        - name: profiles
          configMap:
            name: openshell-apparmor-profiles
        - name: sys
          hostPath:
            path: /sys
        - name: apparmor
          hostPath:
            path: /etc/apparmor.d
