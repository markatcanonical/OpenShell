apiVersion: v1
kind: ConfigMap
metadata:
  name: openshell-apparmor-profiles
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
data:
  openshell-supervisor: |-
    #include <tunables/global>

    profile openshell-supervisor flags=(attach_disconnected,mediate_deleted) {
      #include <abstractions/base>

      # Allow all network operations
      network,
      
      # Explicit capabilities required by the supervisor
      capability sys_admin,
      capability net_admin,
      capability sys_ptrace,
      capability syslog,
      capability dac_override,
      capability dac_read_search,
      capability chown,
      capability setuid,
      capability setgid,

      # Allow file read/write (the container mount namespace restricts host access)
      file,

      # Explicitly deny mounting over critical system boundaries
      deny mount -> /proc/**,
      deny mount -> /sys/**,
      deny mount -> /dev/**,

      # Allow namespace isolation mounts required by iproute2 (make-rslave on /)
      mount options=(rw, rslave) -> /,

      # Allow bind mounting the network namespace
      mount options=(rw, bind) -> /run/netns/**,
      mount options=(rw, rbind) /run/netns/ -> /run/netns/,
      mount options=(rw, rbind) /run/netns -> /run/netns,
      
      # Allow shared mount propagation (ip netns uses MS_SHARED | MS_REC, which is make-rshared/rshared)
      mount options=(rw, rshared) -> /run/netns,
      mount options=(rw, rshared) -> /run/netns/,

      # Allow namespace isolation umounts/mounts
      umount /sys/,
      umount /run/netns/**,
      mount fstype=sysfs -> /sys/,

      # Restrict signals and ptrace to own profile
      signal (send, receive) peer=@{profile_name},
      ptrace (trace, tracedby) peer=@{profile_name},
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "openshell.fullname" . }}-apparmor-loader
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: apparmor-loader
      {{- include "openshell.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apparmor-loader
        {{- include "openshell.selectorLabels" . | nindent 8 }}
    spec:
      hostPID: true
      containers:
        - name: loader
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              echo "Loading openshell-supervisor AppArmor profile..."
              cp /profiles/openshell-supervisor /etc/apparmor.d/openshell-supervisor
              nsenter -t 1 -m -u -i -n -- apparmor_parser -r -W /etc/apparmor.d/openshell-supervisor
              echo "Profile loaded successfully. Sleeping indefinitely."
              sleep infinity
          volumeMounts:
            - name: profiles
              mountPath: /profiles
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: apparmor
              mountPath: /etc/apparmor.d
      volumes:
        - name: profiles
          configMap:
            name: openshell-apparmor-profiles
        - name: sys
          hostPath:
            path: /sys
        - name: apparmor
          hostPath:
            path: /etc/apparmor.d
