name: openshell-core
base: ubuntu@24.04
adopt-info: workspace
version: git
summary: OpenShell Core
description: OpenShell Gateway and Supervisor

platforms:
  amd64:
  arm64:

parts:
  workspace:
    plugin: rust
    source: .
    build-packages:
      - build-essential
      - pkg-config
      - libssl-dev
      - clang
      - libclang-dev
      - libz3-dev
    stage-packages:
      - libz3-4
      - ca-certificates
    rust-features: []
    rust-path: 
      - "crates/openshell-server"
      - "crates/openshell-sandbox"
    organize:
      bin/openshell-gateway: usr/local/bin/openshell-gateway
      bin/openshell-sandbox: usr/local/bin/openshell-sandbox
    override-pull: |
      craftctl default
      # Set version to git describe or short commit hash
      craftctl set version=$(git describe --tags --abbrev=10 || git rev-parse --short HEAD)


  migrations:
    plugin: dump
    source: crates/openshell-server/migrations
    organize:
      '*': build/crates/openshell-server/migrations/
