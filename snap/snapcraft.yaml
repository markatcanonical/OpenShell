name: openshell
title: OpenShell
base: core24
version: 'git'
summary: OpenShell CLI and Gateway
description: |
  OpenShell is an agent manager that runs sandboxed agents in lightweight
  microVMs (libkrun) or on Kubernetes.

contact: https://github.com/NVIDIA/OpenShell/issues
license: Apache-2.0
issues: https://github.com/NVIDIA/OpenShell/issues
source-code: https://github.com/NVIDIA/OpenShell
website: https://github.com/NVIDIA/OpenShell
donation: https://nvidia.com/

adopt-info: workspace
confinement: strict

apps:
  openshell:
    command: bin/openshell
    environment:
      KUBECONFIG: $SNAP_REAL_HOME/.kube/config
    plugs:
      - network
      - network-bind
      - kube-config
      - home
    completer: etc/bash_completion.d/snap.openshell
  gateway:
    command: bin/openshell-server-wrapper
    daemon: simple
    environment:
      KUBECONFIG: $SNAP_REAL_HOME/.kube/config
    plugs:
      - network
      - network-bind
      - kube-config
      - kvm

plugs:
  kube-config:
    interface: personal-files
    read:
      - $HOME/.kube/config

layout:
  /etc/containers:
    bind: $SNAP/etc/containers


parts:
  workspace:
    plugin: rust
    source: .
    build-environment:
      - OPENSHELL_VM_RUNTIME_COMPRESSED_DIR: $CRAFT_STAGE/vm-runtime
    after: [vm-runtime, vm-rootfs]
    build-packages:
      - build-essential
      - pkg-config
      - libssl-dev
      - clang
      - libclang-dev
      - libz3-dev
      - git
    stage-packages:
      - libz3-4
      - skopeo
      - openssh-client
      - curl
    rust-features: []
    rust-path: ["crates/openshell-cli", "crates/openshell-server", "crates/openshell-driver-vm"]
    override-pull: |
      # Pull the source using snapcraft.
      craftctl default

      # Set defaults.
      grade=devel
      full_tag="$(git describe --tags --abbrev=0 2>/dev/null)" || true
      hash="$(git rev-parse --short HEAD 2>/dev/null)"

      # Remove leading 'v' from tag for the version string.
      tag="${full_tag#v}"

      # Check for tagged version.
      if [ -n "$full_tag" ]; then
        count="$(git rev-list "$full_tag".. --count 2>/dev/null)"
        if [ "$count" -eq 0 ]; then
          version="$tag"
          grade=stable
        else
          version="$tag+git$count.$hash"
        fi
      else
        count="$(git rev-list HEAD --count 2>/dev/null)"
        version="0+git$count.$hash"
      fi

      # Relay back to snapcraft.
      craftctl set grade="$grade"
      craftctl set version="$version"
    override-build: |
      craftctl default

      mkdir -p ${CRAFT_PART_INSTALL}/etc/bash_completion.d/
      ${CRAFT_PART_INSTALL}/bin/openshell completions bash > ${CRAFT_PART_INSTALL}/etc/bash_completion.d/snap.openshell

      # Provide an empty registries.conf to avoid skopeo permission denied errors in strict confinement
      mkdir -p ${CRAFT_PART_INSTALL}/etc/containers
      touch ${CRAFT_PART_INSTALL}/etc/containers/registries.conf


  vm-runtime:
    plugin: nil
    build-packages:
      - wget
      - zstd
      - tar
    override-build: |
      if [ "$CRAFT_ARCH_BUILD_FOR" = "amd64" ]; then
        PLATFORM="linux-x86_64"
      elif [ "$CRAFT_ARCH_BUILD_FOR" = "arm64" ]; then
        PLATFORM="linux-aarch64"
      else
        echo "Unsupported architecture"
        exit 1
      fi
      
      URL="https://github.com/NVIDIA/OpenShell/releases/download/vm-dev/vm-runtime-${PLATFORM}.tar.zst"
      echo "Downloading $URL"
      
      EXTRACT_DIR=$(mktemp -d)
      wget -qO- "$URL" | zstd -d --stdout | tar -xf - -C "$EXTRACT_DIR"
      
      mkdir -p $CRAFT_PART_INSTALL/vm-runtime
      for file in "$EXTRACT_DIR"/*; do
        [ -f "$file" ] || continue
        name=$(basename "$file")
        [ "$name" = "provenance.json" ] && continue
        zstd -19 -f -q -T0 -o "$CRAFT_PART_INSTALL/vm-runtime/${name}.zst" "$file"
      done

  vm-rootfs:
    plugin: dump
    source: target/vm-runtime-compressed
    organize:
      'rootfs.tar.zst': vm-runtime/rootfs.tar.zst

  helm-charts:
    plugin: dump
    source: deploy/helm
    organize:
      '*': helm-charts/

  helm-binary:
    plugin: nil
    stage-snaps:
      - helm/3.7/stable
    override-build: |
      mkdir -p $CRAFT_PART_INSTALL/bin
    organize:
      helm: bin/helm
    stage:
      - bin/helm

  images:
    plugin: dump
    source: snap/local-images
    organize:
      '*': images/

  local-bin:
    plugin: dump
    source: snap/local-bin
    organize:
      '*': bin/
