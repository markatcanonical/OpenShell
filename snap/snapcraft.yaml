name: openshell
title: OpenShell
base: core24
version: 'git'
summary: OpenShell CLI and Gateway
description: |
  OpenShell is an agent manager that drives Kubernetes to run sandboxed agents.
  This snap packages the CLI tool and the host-native gateway daemon.

contact: https://github.com/NVIDIA/OpenShell/issues
license: Apache-2.0
issues: https://github.com/NVIDIA/OpenShell/issues
source-code: https://github.com/NVIDIA/OpenShell
website: https://github.com/NVIDIA/OpenShell
donation: https://nvidia.com/

grade: stable
confinement: strict

apps:
  openshell:
    command: bin/openshell
    environment:
      KUBECONFIG: $SNAP_REAL_HOME/.kube/config
      OPENSHELL_GATEWAY_ENDPOINT: unix://$SNAP_COMMON/run/gateway.sock
    plugs:
      - network
      - network-bind
      - kube-config
  server:
    command: bin/openshell-server-wrapper
    daemon: simple
    environment:
      KUBECONFIG: $SNAP_REAL_HOME/.kube/config
    plugs:
      - network
      - network-bind
      - kube-config
      - kvm
  cluster:
    command: bin/openshell cluster
    environment:
      KUBECONFIG: $SNAP_REAL_HOME/.kube/config
    plugs:
      - network
      - network-bind
      - kube-config

plugs:
  kube-config:
    interface: personal-files
    read:
      - $HOME/.kube/config

parts:
  workspace:
    plugin: rust
    source: .
    build-environment:
      - OPENSHELL_VM_RUNTIME_COMPRESSED_DIR: $CRAFT_STAGE/vm-runtime
    after: [vm-runtime]
    build-packages:
      - build-essential
      - pkg-config
      - libssl-dev
      - clang
      - libclang-dev
      - libz3-dev
    stage-packages:
      - libz3-4
      - skopeo
      - openssh-client
    rust-features: []
    rust-path: ["crates/openshell-cli", "crates/openshell-server", "crates/openshell-driver-vm"]

  vm-runtime:
    plugin: dump
    source: target/vm-runtime-compressed
    organize:
      '*': vm-runtime/

  helm-charts:
    plugin: dump
    source: deploy/helm
    organize:
      '*': helm-charts/

  helm-binary:
    plugin: nil
    stage-snaps:
      - helm/3.7/stable
    override-build: |
      mkdir -p $CRAFT_PART_INSTALL/bin
    organize:
      helm: bin/helm
    stage:
      - bin/helm

  images:
    plugin: dump
    source: snap/local-images
    organize:
      '*': images/

  local-bin:
    plugin: dump
    source: snap/local-bin
    organize:
      '*': bin/
