project: openshell

backends:
    garden:
        type: adhoc
        allocate: |
            if [ -n "${SPREAD_HOST_PATH-}" ]; then
                PATH="${SPREAD_HOST_PATH}"
            fi
            export QEMU_MEM_OPTION="-m 6144"
            export QEMU_SMP_OPTION="-smp $(nproc)"
            exec image-garden allocate --spread "$SPREAD_SYSTEM"."$(uname -m)"
        discard: |
            if [ -n "${SPREAD_HOST_PATH-}" ]; then
                PATH="${SPREAD_HOST_PATH}"
            fi
            image-garden discard "$SPREAD_SYSTEM_ADDRESS"
        systems:
            - ubuntu-cloud-24.04:
                  username: ubuntu
                  password: ubuntu
            - ubuntu-cloud-26.04:
                  username: ubuntu
                  password: ubuntu
            - ubuntu-core-24:
                  username: ubuntu
                  password: ubuntu
            - debian-cloud-13:
                  username: debian
                  password: debian
            - fedora-cloud-43:
                  username: fedora
                  password: fedora
            - centos-cloud-9:
                  username: centos
                  password: centos

exclude:
    - "*.rock"
    - ".image-garden/*"

path: /root/openshell

prepare: |
    # Install the openshell snap that was copied into the test environment.
    snap install ./openshell_*.snap --dangerous

    # Let's connect the kvm plug. When installing from the store this
    # is auto-connected by the snap declaration assertion, but locally
    # we need to do it manually.
    snap connect openshell:kvm

debug-each: |
    echo "Kernel and architecture:"
    uname -a

    echo "OS release info:"
    cat /etc/os-release

    echo "Installed snaps:"
    snap list

    echo "Openshell version:"
    snap run openshell --version || true

suites:
    tests/smoke/:
        summary: Smoke tests for OpenShell snap
